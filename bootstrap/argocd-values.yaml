---
# Helm values for the Argo CD install performed by bootstrap/bootstrap.sh
# (platform-iac, S2-01, chart argo/argo-cd). Argo CD is the only component
# installed imperatively; everything else is reconciled from platform-gitops by
# the root App-of-Apps (bootstrap/argocd-bootstrap.yaml).
#
# Only values that diverge from the chart defaults are set here. The chart
# already defaults every component to a single replica, so no replica/resource
# tuning is repeated.
#
# TLS is terminated in Traefik with the wildcard cert *.fhuebung.lol (secret
# wildcard-fhuebung-lol-tls, issued by cert-manager). Argo CD therefore runs in
# insecure (plain-HTTP) mode so it does not double-terminate TLS. At bootstrap
# time Traefik, cert-manager and the wildcard cert do NOT yet exist, so the
# Ingress below is created but dormant; reach the UI via port-forward until the
# platform components reconcile (see README.md, Phase 5).
configs:
  params:
    # Traefik terminates TLS, so argocd-server must serve plain HTTP to avoid a
    # double-TLS / redirect loop behind the ingress.
    server.insecure: true

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.fhuebung.lol
    # Reference the wildcard cert secret materialised by cert-manager at Day-1.
    # The Ingress stays dormant until that secret and Traefik exist.
    extraTls:
      - hosts:
          - argocd.fhuebung.lol
        secretName: wildcard-fhuebung-lol-tls
