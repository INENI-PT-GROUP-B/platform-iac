---
# Root App-of-Apps, applied imperatively by bootstrap/bootstrap.sh (Phase 5)
# immediately after Argo CD is installed.
#
# This is the ONLY Argo CD object applied from disk. It points at
# platform-gitops/applications/, which contains one child Application per
# platform component AND a copy of THIS manifest at applications/root.yaml
# (S2-02). Because that copy is also named `root` with an identical spec, Argo CD
# adopts and self-manages this root on the first sync: from then on the root is
# reconciled from git like every other component. There is never a second,
# competing root Application.
#
# CONTRACT WITH S2-02 (platform-gitops/applications/root.yaml, am): the spec
# below MUST stay byte-for-byte equivalent to applications/root.yaml. Any
# divergence leaves the root Application permanently OutOfSync (self-heal would
# fight the local apply on every bootstrap re-run). Enforced pre-merge by
# .github/workflows/root-app-spec-identity.yml (caller of the org-wide reusable
# defined in INENI-PT-GROUP-B/.github). See platform-gitops#29.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    # Flat-layout convention: Applications live directly under applications/.
    # `directory.recurse` is intentionally NOT set here. The Argo CD CRD field is
    # a `bool` with no schema default, and the Go marshaller strips `false` (the
    # zero-value of an omitempty field) on persist, so an explicit
    # `directory.recurse: false` survives in git but not in the live object —
    # which leaves the root permanently OutOfSync against this manifest. Letting
    # the field default (false = no recursion) keeps git and the live state
    # consistent; subdirectories under applications/ are ignored either way.
    path: applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
