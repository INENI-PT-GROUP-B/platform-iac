---
# Pulls validation-day1-test from Google Secret Manager into a Kubernetes
# Secret eso-test-payload in this namespace. Backs the AC3 round-trip
# assertion. The ClusterSecretStore gcp-secret-manager is provisioned by
# external-secrets/clustersecretstores/gcp-secret-manager.yaml in
# platform-gitops (synced via applications/external-secrets-clustersecretstore.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: eso-test-payload
  namespace: validation-day1
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: eso-test-payload
    creationPolicy: Owner
  data:
    - secretKey: value
      remoteRef:
        key: validation-day1-test
